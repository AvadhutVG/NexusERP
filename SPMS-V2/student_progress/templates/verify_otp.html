<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
<style>
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#eef1f5;
    margin:0;
    padding-top: 90px;
}

/* Center box properly */
.container{
    width: 35%;
    margin: 20px auto;
}

/* Message styling */
.alert{
    text-align:center;
    color:#d63031;
    font-weight:500;
    margin-bottom:10px;
}

/* Card box */
.card{
    background:white;
    padding: 35px;
    border-radius: 16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    text-align:center;
}

/* Title */
h2{
    margin-bottom: 8px;
    font-size: 22px;
}

/* Subtitle */
.subtitle{
    color:#555;
    font-size:14px;
    margin-bottom:20px;
}

/* Email badge */
.badge{
    background:#eef6ff;
    padding:6px 12px;
    border-radius:8px;
    font-weight:bold;
    font-size: 13px;
    display:inline-block;
    margin-bottom: 15px;
}

/* Input */
input{
    padding:12px;
    width:80%;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    text-align:center;
    letter-spacing:3px;
}

/* Buttons */
.btn{
    display:block;
    width:60%;
    margin:10px auto;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

/* Verify button */
.verify{
    background:#007bff;
    color:white;
}

/* Resend button */
.resend{
    background:#e9f2ff;
    color:#007bff;
    border:1px solid #007bff;
}

/* Back link */
.back{
    display:block;
    margin-top:15px;
    color:#555;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- ✅ YOUR MESSAGES BLOCK (kept + styled) -->
{% if messages %}
  {% for m in messages %}
    <p class="alert">{{ m }}</p>
  {% endfor %}
{% endif %}

<div class="container">
<div class="card">

<h2>🔐 Verify Your Email</h2>

<p class="subtitle">
We have sent a 6-digit OTP to your email. Enter it below to complete registration.
</p>

<span class="badge">
{{ request.session.temp_teacher.email }}
</span>

<form method="POST">
{% csrf_token %}
<input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
<br><br>

<button type="submit" class="btn verify">Verify OTP</button>
</form>

<a href="{% url 'resend_otp' %}" class="btn resend">Resend OTP</a>

<a href="/teacher-register/" class="back">← Back to Register</a>

</div>
</div>

{% include "footer.html" %}
</body>
</html>
