<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Progress System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --bg-body: #F8FAFC;
            --bg-card: #FFFFFF;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --danger: #ef4444;
            --radius: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        /* Global Reset */
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-top: 90px; /* Space for navbar */
            padding-bottom: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Limits width for a focused form */
            margin: 0 auto;
            padding: 0 1.5rem;
            flex: 1; /* Pushes footer down */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Vertically center the card */
        }

        .card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: -0.5rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-main);
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 0.875rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Back Link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Alerts */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            background-color: #fef2f2;
            color: var(--danger);
            border: 1px solid #fee2e2;
            text-align: center;
        }
    </style>
</head>
<body>

{% include "navbar.html" %}

<div class="container">
    <div class="card">
        <h2>Edit Student Details</h2>

        {% if messages %}
            {% for m in messages %}
                <div class="alert">
                    {{ m }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Full Name</label>
            <input type="text" name="name" value="{{ student.name }}" required>

            <label>Roll Number</label>
            <input type="text" name="roll_no" value="{{ student.roll_no }}" required>

            <button type="submit">Update Student</button>
        </form>

        <a href="/manage-students/" class="back-link">
            ← Cancel and go back
        </a>
    </div>
</div>

{% include "footer.html" %}

</body>
</html>
