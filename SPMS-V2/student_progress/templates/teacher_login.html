<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - Student Progress System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --bg-body: #F8FAFC;
            --bg-card: #FFFFFF;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e2e8f0;
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.025em;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 0.875rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            border: 1px solid #fee2e2;
        }

        .links {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
        }

        .links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--primary);
        }

        .links .primary-link {
            color: var(--primary);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Teacher Login</h2>

        <form method="POST">
            <!-- Django CSRF Token (will render hidden input in production) -->
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit">Sign In</button>
        </form>

        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}

        <div class="links">
            <a href="/teacher-register/" class="primary-link">New teacher? Register here</a>
            <a href="/">← Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
